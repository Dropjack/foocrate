  <text x="48" y="84" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" fill="#62696C">两套浅色 + 两套深色；每张卡依次展示背景、面板、表面、正文、次要文字、强调、默认列表与错误色。</text>

